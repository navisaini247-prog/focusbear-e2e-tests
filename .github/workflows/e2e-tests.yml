name: Focus Bear E2E Tests (Mac)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  mac-tests:
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-html
    
    - name: Run tests
      run: pytest tests/ -v -s --html=report.html --self-contained-html
    
    - name: Upload report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-report-${{ github.run_number }}
        path: report.html
